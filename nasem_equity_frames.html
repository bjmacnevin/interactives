<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASEM 2024 Equity Frames - Workspace</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    height: 100vh;
    overflow: hidden; 
    display: flex;
    flex-direction: column;
  }

  .header-container {
    padding: 20px 20px 0;
    text-align: center;
    pointer-events: none;
    z-index: 100;
  }

  h1 {
    color: #ffd400;
    font-weight: 600;
    margin: 0;
    text-shadow: 0 0 15px rgba(0,0,0,0.8);
  }

  .subtitle {
    color: #aaa;
    margin: 5px 0 0;
    font-size: 0.95rem;
  }

  #viewport {
    flex-grow: 1;
    width: 100%;
    overflow: hidden;
    position: relative;
    /* Golden Grid with radial fade */
    background-color: #000;
    background-image: 
      radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 95%),
      linear-gradient(to right, rgba(255, 212, 0, 0.4) 1.5px, transparent 1.5px),
      linear-gradient(to bottom, rgba(255, 212, 0, 0.4) 1.5px, transparent 1.5px);
    background-size: 100% 100%, 50px 50px, 50px 50px;
  }

  #workspace {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: center center;
    transition: transform 0.2s ease-out; /* Slight transition for smooth auto-scaling */
  }

  .card {
    position: absolute;
    perspective: 1400px;
    width: 320px;
    height: 540px;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  .card:active { cursor: grabbing; }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: #fff;
    color: #1a1a1a;
    border: 5px solid #ffd400;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
  }

  .card-front { justify-content: flex-start; background: #fdfdfd; }

  .card-front .frame-number {
    font-size: 2.8rem;
    font-weight: 800;
    margin: 0 0 10px;
    color: #b58a00;
    text-align: center;
  }

  .card-front .frame-title {
    font-size: 1.25rem;
    text-align: left;
    margin-bottom: 12px;
    font-weight: 700;
    line-height: 1.2;
    color: #000;
  }

  .card-front .frame-desc {
    font-size: 0.85rem;
    line-height: 1.45;
    color: #333;
    text-align: left;
    overflow-y: auto;
    flex-grow: 1;
    margin-bottom: 10px;
  }

  .card-back { transform: rotateY(180deg); }

  .card-back .frame-number {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #b58a00;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .strategies-heading {
    font-size: 1.05rem;
    font-weight: 700;
    color: #000;
    margin-bottom: 12px;
  }

  .strategies {
    padding-left: 18px;
    font-size: 0.82rem;
    line-height: 1.45;
    color: #333;
    overflow-y: auto;
    flex-grow: 1;
  }

  .strategies li { margin-bottom: 9px; }

  .btn-flip {
    margin-top: auto;
    background: #f0f0f0;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-flip:hover { background: #ffd400; border-color: #b58a00; }

  .footer {
    text-align: center;
    padding: 15px;
    color: #ccc;
    font-size: 0.8rem;
    z-index: 100;
    background: rgba(0,0,0,0.8);
  }

  .footer a { color: #ffd400; text-decoration: none; font-weight: 600; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

  <div class="header-container">
    <h1>NASEM 2024 Equity Frames</h1>
    <p class="subtitle">Drag to arrange. Scroll to zoom. Use button to flip.</p>
  </div>

  <div id="viewport">
    <div id="workspace"></div>
  </div>

  <div class="footer">
    Based on the National Academies Report: 
    <a href="https://www.nationalacademies.org/projects/DBASSE-BOSE-18-03" target="_blank">Equity in K-12 STEM Education (2024)</a>
  </div>

<script>
  const frames = [
    { 
      num: "Frame 1", 
      title: "Reducing gaps between groups", 
      desc: "Aim to address gaps between different groups based on race, gender identity, or some other factor such as social class. Those gaps might be related to interest in STEM, achievement, or representation within the STEM workforce.", 
      strategies: ["Analyze data for disparities in participation.", "Implement targeted interventions for underserved students.", "Foster inclusive culture and incorporate diverse scientific knowledge."] 
    },
    { 
      num: "Frame 2", 
      title: "Expanding opportunity and access", 
      desc: "Focus on access to opportunities in STEM, such as access to well-prepared educators, supporter networks, and high-quality curricular experiences.", 
      strategies: ["Adopt inclusive teaching practices.", "Collaborate with community for mentorship.", "Encourage extra-curricular STEM participation."] 
    },
    { 
      num: "Frame 3", 
      title: "Embracing heterogeneity in STEM", 
      desc: "Emphasize engaging with the lived experiences and identities of students who have been marginalized. Value different ways of thinking and being.", 
      strategies: ["Use culturally relevant pedagogy.", "Facilitate collaborative learning.", "Encourage student-led cultural exploration projects."] 
    },
    { 
      num: "Frame 4", 
      title: "Learning STEM to promote justice", 
      desc: "Center learning STEM as a resource within movements for social justice. Address the history of STEM as an instrument of nationalism or colonialism.", 
      strategies: ["Integrate social justice themes with STEM content.", "Discuss ethical implications of advancements.", "Support solutions for local/global challenges."] 
    },
    { 
      num: "Frame 5", 
      title: "Envisioning sustainable futures", 
      desc: "Cultivate equitable and thriving social and ecological futures. Reimagining the structures and setting for schooling.", 
      strategies: ["Integrate sustainability concepts.", "Promote systems thinking.", "Encourage innovation for sustainable solutions."] 
    }
  ];

  const workspace = document.getElementById("workspace");
  const viewport = document.getElementById("viewport");
  let highestZ = 10;
  let scale = 1;

  const cardWidth = 320;
  const cardHeight = 540;
  const hGap = 40;
  const vGap = 40;

  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    scale = Math.min(Math.max(0.2, scale + delta), 2);
    workspace.style.transform = `scale(${scale})`;
  }, { passive: false });

  function initLayout() {
    const wsWidth = viewport.offsetWidth;
    const wsHeight = viewport.offsetHeight;

    const row1Width = (cardWidth * 3) + (hGap * 2);
    const totalBlockHeight = (cardHeight * 2) + vGap;

    // A: Calculate Scale to Fit
    const padding = 60; // Extra room for comfort
    const scaleX = wsWidth / (row1Width + padding);
    const scaleY = wsHeight / (totalBlockHeight + padding);
    
    // Auto-set the initial scale (don't exceed 1.0 on large screens)
    scale = Math.min(scaleX, scaleY, 1.0);
    workspace.style.transform = `scale(${scale})`;

    const startX_Row1 = (wsWidth - row1Width) / 2;
    const startX_Row2 = (wsWidth - ((cardWidth * 2) + hGap)) / 2;
    const startY = (wsHeight - totalBlockHeight) / 2;

    workspace.innerHTML = ""; 

    frames.forEach((f, index) => {
      const card = document.createElement("div");
      card.className = "card";
      
      let row = index < 3 ? 0 : 1;
      let col = index < 3 ? index : index - 3;
      
      let xPos = row === 0 ? startX_Row1 + (col * (cardWidth + hGap)) : startX_Row2 + (col * (cardWidth + hGap));
      let yPos = startY + (row * (cardHeight + vGap));

      card.style.left = xPos + "px";
      card.style.top = yPos + "px";
      card.style.zIndex = index;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="frame-number">${f.num}</div>
            <h2 class="frame-title">${f.title}</h2>
            <div class="frame-desc">${f.desc}</div>
            <button class="btn-flip">View Strategies &#8635;</button>
          </div>
          <div class="card-face card-back">
            <div class="frame-number">${f.num}</div>
            <h3 class="strategies-heading">Strategies for Educators</h3>
            <ul class="strategies">${f.strategies.map(s => `<li>${s}</li>`).join("")}</ul>
            <button class="btn-flip">Back to Info &#8635;</button>
          </div>
        </div>
      `;

      card.querySelectorAll('.btn-flip').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          card.classList.toggle('flipped');
        });
      });

      let isDragging = false;
      let offX, offY;

      card.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        isDragging = true;
        highestZ++;
        card.style.zIndex = highestZ;
        
        // Use normalized client coords for drag start
        offX = (e.clientX - viewport.offsetLeft) / scale - card.offsetLeft;
        offY = (e.clientY - viewport.offsetTop) / scale - card.offsetTop;
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        card.style.left = ((e.clientX - viewport.offsetLeft) / scale - offX) + "px";
        card.style.top = ((e.clientY - viewport.offsetTop) / scale - offY) + "px";
      });

      document.addEventListener('mouseup', () => { isDragging = false; });
      workspace.appendChild(card);
    });
  }

  window.onload = initLayout;
  window.onresize = initLayout;
</script>
</body>
</html>
