<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASEM 2024 Equity Frames - Workspace</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    overflow: hidden; 
  }

  h1 {
    text-align: center;
    color: #ffd400;
    font-weight: 600;
    margin: 10px 0 5px;
    pointer-events: none;
  }

  .subtitle {
    text-align: center;
    color: #aaa;
    margin: 0 0 20px;
    font-size: 0.95rem;
    pointer-events: none;
  }

  #workspace {
    position: relative;
    width: 100%;
    height: calc(100vh - 120px);
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    position: absolute;
    perspective: 1400px;
    width: 320px;
    height: 540px;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  .card:active {
    cursor: grabbing;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: #fff;
    color: #1a1a1a;
    border: 5px solid #ffd400;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
  }

  /* Front Styles */
  .card-front {
    justify-content: flex-start;
    background: #fdfdfd;
  }

  .card-front .frame-number {
    font-size: 2.8rem;
    font-weight: 800;
    margin: 5px 0 20px;
    color: #b58a00;
    text-align: center;
  }

  .card-front .frame-title {
    font-size: 1.3rem;
    text-align: left;
    margin-bottom: 15px;
    font-weight: 700;
    line-height: 1.2;
  }

  .card-front .frame-desc {
    font-size: 0.85rem;
    line-height: 1.45;
    color: #333;
    text-align: left;
    overflow-y: auto;
  }

  /* Back Styles */
  .card-back {
    transform: rotateY(180deg);
  }

  .card-back .frame-number {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #b58a00;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .strategies-heading {
    font-size: 1.05rem;
    font-weight: 700;
    color: #000;
    margin-bottom: 12px;
  }

  .strategies {
    padding-left: 18px;
    font-size: 0.82rem;
    line-height: 1.45;
    color: #333;
    overflow-y: auto;
    flex-grow: 1;
  }

  .strategies li { margin-bottom: 9px; }

  .btn-flip {
    margin-top: 15px;
    background: #f0f0f0;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-flip:hover { background: #ffd400; border-color: #b58a00; }
</style>
</head>
<body>

  <h1>NASEM 2024 Equity Frames</h1>
  <p class="subtitle">Drag cards to arrange. Use button to flip.</p>

  <div id="workspace"></div>

<script>
  const frames = [
    { 
      num: "Frame 1", 
      title: "Reducing gaps between groups", 
      desc: "Aim to address gaps between different groups based on race, gender identity, or some other factor such as social class. Those gaps might be related to interest in STEM, achievement, or representation within the STEM workforce.", 
      strategies: ["Analyze data to identify and understand disparities in student performance.", "Implement targeted interventions to support underserved students.", "Foster an inclusive classroom culture that recognizes diversity."] 
    },
    { 
      num: "Frame 2", 
      title: "Expanding opportunity and access", 
      desc: "Focus on access to opportunities in STEM, such as those that result from differences in social and material resources necessary to learn—access to well-prepared educators and high-quality curricula.", 
      strategies: ["Adopt inclusive teaching practices for diverse learning needs.", "Collaborate with community organizations for mentorship.", "Encourage participation in extra-curricular STEM activities."] 
    },
    { 
      num: "Frame 3", 
      title: "Embracing heterogeneity", 
      desc: "Emphasize engaging with the concerns, lived experiences, and identities of students who have been marginalized. Value the different ways of thinking and being within STEM classrooms.", 
      strategies: ["Incorporate culturally relevant pedagogy connected to lived experience.", "Facilitate collaborative learning that values multiple viewpoints.", "Encourage student-led projects exploring individual cultural contexts."] 
    },
    { 
      num: "Frame 4", 
      title: "STEM to promote justice", 
      desc: "Center learning STEM as a resource within movements for social and socioecological justice. Address the history of STEM as an instrument of nationalism or colonialism.", 
      strategies: ["Design curricula that integrate social justice themes with STEM.", "Encourage critical discussions about ethical implications of advancements.", "Support student initiatives that use STEM for local challenges."] 
    },
    { 
      num: "Frame 5", 
      title: "Sustainable futures", 
      desc: "Cultivating equitable, just, and thriving social and ecological futures that support both ecological and human wellbeing. Reimagining the structures and setting for schooling.", 
      strategies: ["Integrate sustainability concepts highlighting environmental roles.", "Promote systems thinking to understand interconnectedness.", "Encourage innovation in developing sustainable solutions."] 
    }
  ];

  const workspace = document.getElementById("workspace");
  let highestZ = 10;

  // Configuration for the 2-row layout
  const cardWidth = 320;
  const cardHeight = 540;
  const horizontalGap = 40;
  const verticalGap = 40;

  frames.forEach((f, index) => {
    const card = document.createElement("div");
    card.className = "card";
    
    // Determine row and column
    // Row 1: Index 0, 1, 2
    // Row 2: Index 3, 4
    let row = index < 3 ? 0 : 1;
    let col = index < 3 ? index : index - 3;
    
    // Calculate initial positions
    let startX = col * (cardWidth + horizontalGap);
    let startY = row * (cardHeight + verticalGap);
    
    // Center the second row (2 cards) relative to the first row (3 cards)
    if (row === 1) {
        startX += (cardWidth + horizontalGap) / 2;
    }

    card.style.left = startX + "px";
    card.style.top = startY + "px";
    card.style.zIndex = index;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="frame-number">${f.num}</div>
          <h2 class="frame-title">${f.title}</h2>
          <p class="frame-desc">${f.desc}</p>
          <button class="btn-flip">View Strategies &#8635;</button>
        </div>
        <div class="card-face card-back">
          <div class="frame-number">${f.num}</div>
          <h3 class="strategies-heading">Strategies for Educators</h3>
          <ul class="strategies">${f.strategies.map(s => `<li>${s}</li>`).join("")}</ul>
          <button class="btn-flip">Back to Info &#8635;</button>
        </div>
      </div>
    `;

    // Flip logic
    card.querySelectorAll('.btn-flip').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.toggle('flipped');
      });
    });

    // Drag logic
    let isDragging = false;
    let offsetX, offsetY;

    card.addEventListener('mousedown', (e) => {
      if (e.target.tagName === 'BUTTON') return; // Don't drag if clicking button
      isDragging = true;
      highestZ++;
      card.style.zIndex = highestZ;
      offsetX = e.clientX - card.getBoundingClientRect().left;
      offsetY = e.clientY - card.getBoundingClientRect().top;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const workspaceRect = workspace.getBoundingClientRect();
      card.style.left = (e.clientX - workspaceRect.left - offsetX) + "px";
      card.style.top = (e.clientY - workspaceRect.top - offsetY) + "px";
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    workspace.appendChild(card);
  });
</script>
</body>
</html>
