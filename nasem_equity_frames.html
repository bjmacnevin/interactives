<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASEM 2024 Equity Frames - Interactive Workspace</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    overflow: hidden; /* Prevents scrollbars while dragging */
  }

  h1 {
    text-align: center;
    color: #ffd400;
    font-weight: 600;
    margin: 0 0 8px;
    pointer-events: none;
  }

  .subtitle {
    text-align: center;
    color: #aaa;
    margin: 0 0 20px;
    font-size: 0.95rem;
    pointer-events: none;
  }

  /* The workspace allows free movement */
  #workspace {
    position: relative;
    width: 100%;
    height: calc(100vh - 120px);
  }

  .card {
    position: absolute; /* Essential for overlapping/moving */
    perspective: 1400px;
    width: 300px;
    height: 500px;
    cursor: grab;
    user-select: none;
    touch-action: none; /* Prevents scrolling on mobile while dragging */
  }

  .card:active {
    cursor: grabbing;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: #fff;
    color: #1a1a1a;
    border: 5px solid #ffd400;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
  }

  /* Front Styles */
  .card-front {
    justify-content: flex-start;
    background: #fdfdfd;
  }

  .card-front .frame-number {
    font-size: 2.5rem;
    font-weight: 800;
    margin: 5px 0 15px;
    color: #b58a00;
    text-align: center;
  }

  .card-front .frame-title {
    font-size: 1.2rem;
    text-align: left;
    margin-bottom: 15px;
    font-weight: 700;
  }

  .card-front .frame-desc {
    font-size: 0.85rem;
    line-height: 1.45;
    color: #333;
    overflow-y: auto;
  }

  /* Back Styles */
  .card-back {
    transform: rotateY(180deg);
    background: #fff;
  }

  .card-back .frame-number {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: #b58a00;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .strategies-heading {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .strategies {
    padding-left: 18px;
    font-size: 0.82rem;
    line-height: 1.4;
    overflow-y: auto;
  }

  .strategies li { margin-bottom: 8px; }

  .btn-flip {
    margin-top: auto;
    background: #eee;
    border: none;
    padding: 8px;
    border-radius: 8px;
    font-size: 0.7rem;
    cursor: pointer;
    text-align: center;
  }

  .btn-flip:hover { background: #ffd400; }
</style>
</head>
<body>

  <h1>NASEM 2024 Equity Frames</h1>
  <p class="subtitle">Drag to move and overlap. Use the button to flip.</p>

  <div id="workspace"></div>

<script>
  const frames = [
    { num: "Frame 1", title: "Reducing gaps between groups", desc: "Aim to address gaps between different groups based on race, gender identity, or some other factor such as social class.", strategies: ["Analyze data for disparities", "Targeted interventions", "Inclusive classroom culture"] },
    { num: "Frame 2", title: "Expanding opportunity and access", desc: "Focus on access to opportunities in STEM, such as social and material resources necessary to learn.", strategies: ["Inclusive teaching practices", "Community collaboration", "Extra-curricular access"] },
    { num: "Frame 3", title: "Embracing heterogeneity", desc: "Emphasize engaging with the concerns, lived experiences, and identities of marginalized students.", strategies: ["Culturally relevant pedagogy", "Collaborative learning", "Student-led projects"] },
    { num: "Frame 4", title: "STEM to promote justice", desc: "Center learning STEM as a resource within movements for social and socioecological justice.", strategies: ["Integrate social justice themes", "Ethical discussions", "STEM for local challenges"] },
    { num: "Frame 5", title: "Sustainable futures", desc: "Cultivating equitable, just, and thriving social and ecological futures for human wellbeing.", strategies: ["Sustainability curricula", "Systems thinking", "Innovation for solutions"] }
  ];

  const workspace = document.getElementById("workspace");
  let highestZ = 10;

  frames.forEach((f, index) => {
    const card = document.createElement("div");
    card.className = "card";
    
    // Spread cards out initially
    card.style.left = (index * 60 + 50) + "px";
    card.style.top = (index * 30 + 50) + "px";
    card.style.zIndex = index;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="frame-number">${f.num}</div>
          <h2 class="frame-title">${f.title}</h2>
          <p class="frame-desc">${f.desc}</p>
          <button class="btn-flip">View Strategies &#8635;</button>
        </div>
        <div class="card-face card-back">
          <div class="frame-number">${f.num}</div>
          <h3 class="strategies-heading">Strategies</h3>
          <ul class="strategies">${f.strategies.map(s => `<li>${s}</li>`).join("")}</ul>
          <button class="btn-flip">Back to Info &#8635;</button>
        </div>
      </div>
    `;

    // Handle Flipping (using the button so it doesn't interfere with dragging)
    card.querySelectorAll('.btn-flip').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.toggle('flipped');
      });
    });

    // Handle Dragging
    let isDragging = false;
    let offsetX, offsetY;

    card.addEventListener('mousedown', (e) => {
      isDragging = true;
      // Bring to front
      highestZ++;
      card.style.zIndex = highestZ;
      
      offsetX = e.clientX - card.offsetLeft;
      offsetY = e.clientY - card.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      card.style.left = (e.clientX - offsetX) + "px";
      card.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    workspace.appendChild(card);
  });
</script>
</body>
</html>
